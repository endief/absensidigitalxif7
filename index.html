<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Document</title>
    <style>
        button { font-family: var(--font-body); width: 100%; padding: 16px; border: none; border-radius: 16px; font-size: 15px; font-weight: 700; cursor: pointer; margin-bottom: 16px; transition: all 0.3s ease; }
        .input-field, .custom-select-btn { font-family: var(--font-body); width: 100%; padding: 16px 18px; border: 1.5px solid var(--border-light); background: #ffffff; border-radius: 16px; font-size: 14px; font-weight: 500; color: var(--text-main); outline: none; }
        input[type="file"]::file-selector-button { font-family: var(--font-body); font-weight: 600; background: var(--bg-color); border: 1px solid var(--border-light); padding: 8px 16px; border-radius: 8px; cursor: pointer; transition: all 0.2s; }
        .name-item { padding: 15px 18px; cursor: pointer; border-bottom: 1px solid var(--border-light); font-size: 14px; font-weight: 600; transition: all 0.2s; position: relative; color: #475569; }
        .radio-btn { flex: 1; text-align: center; padding: 16px; border: 1.5px solid var(--border-light); background: #ffffff; border-radius: 16px; cursor: pointer; transition: all 0.3s; font-weight: 600; }
        .radio-btn.active-hadir { border-color: var(--neon-cyan); background: rgba(14, 165, 233, 0.05); color: var(--neon-cyan); box-shadow: 0 10px 20px -5px rgba(14, 165, 233, 0.2); transform: translateY(-3px); }
        .radio-btn.active-izin { border-color: var(--neon-pink); background: rgba(236, 72, 153, 0.05); color: var(--neon-pink); box-shadow: 0 10px 20px -5px rgba(236, 72, 153, 0.2); transform: translateY(-3px); }
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.5); backdrop-filter: blur(8px); display: flex; justify-content: center; align-items: flex-end; opacity: 0; visibility: hidden; transition: all 0.3s ease; z-index: 1000; }
        .modal-content { background: #ffffff; width: 100%; max-width: 480px; border-radius: 32px 32px 0 0; padding: 35px 30px; transform: translateY(100%); transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1); }
        .close-btn { background: #f1f5f9; width: 40px; height: 40px; border-radius: 50%; display: flex; justify-content: center; align-items: center; cursor: pointer; border: none; transition: 0.2s ease; color: var(--text-main); font-size: 18px; }
        .modal-item { padding: 18px; border: 1.5px solid var(--border-light); border-radius: 16px; margin-bottom: 12px; cursor: pointer; font-weight: 600; text-align: center; background: #fff; color: var(--text-main); transition: all 0.2s; }
        .table-responsive { width: 100%; overflow-x: auto; background: #fff; border-radius: 16px; border: 1.5px solid var(--border-light); margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        th { background: #f8fafc; padding: 16px; font-size: 13px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; border-bottom: 2px solid var(--border-light); letter-spacing: 0.5px; }
    </style>
</head>
<body>
    <!-- Body content goes here -->
    <script>
        if(isClosed) Swal.fire({title:'Akses Ditolak', text:'Maaf, PENGELOLA telah menutup sesi absensi saat ini.', icon:'error', timer: 3000, timerProgressBar: true, showConfirmButton: false});
        document.getElementById('btn-admin-hari').classList.remove('selected');
        document.getElementById('btn-admin-mapel').classList.remove('selected');
        document.getElementById('btn-admin-status').classList.remove('selected');
        document.getElementById('btn-admin-hari').classList.add('selected');
        document.getElementById('btn-admin-mapel').classList.remove('selected');
        if(!document.getElementById('filter-admin-hari-val').value) { return Swal.fire({icon: 'warning', title: 'Data Kurang', text: 'Pilih hari terlebih dahulu.', timer: 2000, timerProgressBar: true, showConfirmButton: false}); }
        document.getElementById('btn-admin-mapel').classList.add('selected');
        document.getElementById('btn-admin-status').classList.add('selected');
        document.getElementById('btn-pilih-hari').classList.remove('selected');
        document.getElementById('btn-pilih-mapel').classList.remove('selected');
        document.getElementById('btn-pilih-mapel').classList.remove('selected');
        if(!document.getElementById('hari').value) return Swal.fire({icon: 'warning', title: 'Data Kurang', text: 'Pilih jadwal hari terlebih dahulu.', timer: 2000, timerProgressBar: true, showConfirmButton: false});
        // More JavaScript code here
        // Some point within your code:
        try { /* code */ }
        catch (err) { Swal.fire({title:'Akses Ditolak', text:'Izinkan browser menggunakan kamera untuk verifikasi.', icon:'error', timer: 3000, timerProgressBar:true, showConfirmButton:false}); }
        if (!hari || !mapel || !nama || !status) return Swal.fire({title:'Pendaftaran Gagal', text:'Lengkapi Jadwal, Nama, dan Status Kehadiran.', icon:'warning', timer: 2500, timerProgressBar:true, showConfirmButton:false});
        if (keterangan.length < 5) return Swal.fire({title:'Ditolak', text:'Keterangan izin harus jelas (min 5 huruf).', icon:'warning', timer:2500, timerProgressBar:true, showConfirmButton:false});
        if (fileSurat.length === 0) return Swal.fire({title:'Surat Diperlukan', text:'Unggah foto bukti surat izin.', icon:'warning', timer:2500, timerProgressBar:true, showConfirmButton:false});
        document.getElementById('label-izin').classList.remove('active-izin');
    </script>
</body>
</html>
